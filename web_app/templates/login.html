<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SILENT | Secure Access Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --card-bg: rgba(15, 23, 42, 0.6);
            --input-bg: rgba(2, 6, 23, 0.5);
        }

        body {
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', sans-serif;
        }

        .login-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            z-index: 10;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(245, 196, 0, 0.2);
            border-radius: 32px;
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(245, 196, 0, 0.05);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Cyber corner accents */
        .login-card::before,
        .login-card::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--primary);
            opacity: 0.5;
        }

        .login-card::before {
            top: 0;
            left: 0;
            border-right: 0;
            border-bottom: 0;
            border-top-left-radius: 32px;
        }

        .login-card::after {
            bottom: 0;
            right: 0;
            border-left: 0;
            border-top: 0;
            border-bottom-right-radius: 32px;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .login-logo {
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .login-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 0.75rem;
            letter-spacing: -0.04em;
            background: linear-gradient(to bottom, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            max-width: 280px;
            margin: 0 auto;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        .input-group {
            margin-bottom: 1.75rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-left: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-group input {
            width: 100%;
            background: var(--input-bg) !important;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.1rem 1.1rem 1.1rem 3.5rem !important;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(245, 196, 0, 0.15);
            background: rgba(2, 6, 23, 0.7) !important;
        }

        .input-group i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .input-group input:focus+i {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        .action-btn {
            width: 100%;
            padding: 1.1rem;
            border-radius: 16px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            box-shadow: 0 10px 20px rgba(245, 196, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(245, 196, 0, 0.3);
            filter: brightness(1.1);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .bg-blobs {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: move 25s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -150px;
            left: -150px;
            background: var(--primary);
        }

        .blob-2 {
            bottom: -150px;
            right: -150px;
            background: #f7d354;
            animation-delay: -7s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(100px, 50px) scale(1.1);
            }

            66% {
                transform: translate(-50px, 150px) scale(0.9);
            }

            100% {
                transform: translate(50px, -50px) scale(1.05);
            }
        }

        .footer-note {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.2em;
            opacity: 0.6;
            text-transform: uppercase;
        }

        @media screen and (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }

            .login-title {
                font-size: 1.85rem;
            }

            .login-subtitle {
                font-size: 0.75rem;
            }

            .input-group input {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg class="logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="4" y1="4" x2="36" y2="36" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round"></line>
                        <line x1="36" y1="4" x2="4" y2="36" stroke="currentColor" stroke-width="2.2"
                            stroke-linecap="round"></line>
                        <line x1="12" y1="12" x2="17" y2="7" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round"></line>
                        <line x1="12" y1="12" x2="7" y2="17" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round"></line>
                        <line x1="28" y1="12" x2="23" y2="7" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round"></line>
                        <line x1="28" y1="12" x2="33" y2="17" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round"></line>
                        <circle cx="36" cy="36" r="2" fill="currentColor"></circle>
                        <circle cx="4" cy="36" r="2" fill="currentColor"></circle>
                        <ellipse cx="20" cy="20" rx="9" ry="6" fill="var(--background)" stroke="currentColor"
                            stroke-width="1.6"></ellipse>
                        <circle cx="20" cy="20" r="3.5" fill="currentColor"></circle>
                        <circle cx="20" cy="20" r="1.5" fill="var(--background)"></circle>
                        <circle cx="21.5" cy="18.5" r=".8" fill="white" opacity=".55"></circle>
                    </svg>
                </div>
                <h1 class="login-title">SILENT</h1>
                <p class="login-subtitle">Secure Information Layering Engine for Non-Traceable Transmission</p>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="input-group">
                    <label for="username">Authorized User</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="Enter username" required
                            autofocus>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Access Security Key</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter security key" required>
                        <i class="fa-solid fa-key"></i>
                    </div>
                </div>

                <div style="margin-top: 2.5rem;">
                    <button type="submit" class="action-btn">
                        <i class="fa-solid fa-shield-check"></i> Authenticate & Enter
                    </button>
                </div>
            </form>

            <div class="footer-note">
                SILENT v1.0 • P2P ENCRYPTION SECURED
            </div>
        </div>
    </div>
</body>

</html>
